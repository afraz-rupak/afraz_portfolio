<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Afraz Ul Haque</title>
  <meta name="description" content="Machine learning, deep learning, computer vision, NLP and data science projects by Afraz Ul Haque — with methods, tech stacks and results." />
  <meta name="author" content="Afraz Ul Haque" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="assets/pages.css" />
  <style>
    /* detail drawer */
    .drawer-backdrop { position: fixed; inset: 0; z-index: 200; background: color-mix(in oklab, #000 55%, transparent); backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity .3s; }
    .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; right: 0; bottom: 0; z-index: 201; width: min(620px, 100%); background: var(--bg); border-left: 1px solid var(--border); transform: translateX(100%); transition: transform .4s cubic-bezier(.2,.7,.2,1); overflow-y: auto; }
    .drawer.open { transform: none; }
    .drawer-inner { padding: clamp(1.5rem, 4vw, 2.5rem); }
    .drawer-close { position: sticky; top: 1rem; float: right; width: 2.4rem; height: 2.4rem; border-radius: 9px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text); display: grid; place-items: center; }
    .drawer-close svg { width: 1.2rem; height: 1.2rem; }
  </style>
</head>
<body>
  <div id="site-header-slot"></div>

  <main>
    <section class="page-hero grid-bg">
      <div class="container reveal">
        <span class="eyebrow">Projects</span>
        <h1>Things I've built.</h1>
        <p class="lead">Research prototypes and production systems across computer vision, NLP, medical AI and data science. Click any project for the full breakdown — problem, dataset, method and results.</p>
      </div>
    </section>

    <section class="section-tight">
      <div class="container">
        <div class="section-head-row" style="margin-bottom:1.5rem">
          <div class="filter-row" id="filterRow"></div>
          <div style="display:flex;align-items:center;gap:.8rem">
            <span class="faint" style="font-size:.82rem">Card style</span>
            <div class="style-switch" id="styleSwitch">
              <button data-style="grid" class="active">Grid</button>
              <button data-style="list">Editorial</button>
              <button data-style="min">Compact</button>
            </div>
          </div>
        </div>
        <div id="projectsMount"></div>
      </div>
    </section>
  </main>

  <div id="site-footer-slot"></div>

  <!-- detail drawer -->
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-inner" id="drawerInner"></div>
  </aside>

  <script src="assets/data.js"></script>
  <script src="assets/blog-content.js"></script>
  <script src="assets/store.js"></script>
  <script src="assets/site.js"></script>
  <script>
    let curFilter = "All";
    let curStyle = "grid";

    function filtered() {
      return curFilter === "All" ? PROJECTS : PROJECTS.filter(p => p.category === curFilter);
    }

    function renderGrid(items) {
      return `<div class="proj-grid">` + items.map((p, i) => `
        <article class="card card-hover pcard reveal" data-delay="${(i%2)+1}" data-open="${p.id}">
          <div class="ph thumb" data-label="${p.id} preview"></div>
          <div class="body">
            <div class="top"><span class="tag tag-accent">${p.category}</span><span class="proj-meta">${p.org}</span></div>
            <h3>${p.title}</h3>
            <p class="desc">${p.short}</p>
            <div class="tag-row">${p.tech.slice(0,4).map(tagPill).join("")}</div>
            <div class="foot">
              <div class="metrics">${p.results.slice(0,2).map(r => `<span class="metric"><b>${r.v}</b> ${r.k}</span>`).join("")}</div>
              <span class="link-more">Details ${ICON.arrow}</span>
            </div>
          </div>
        </article>`).join("") + `</div>`;
    }

    function renderList(items) {
      return `<div class="proj-list">` + items.map((p, i) => `
        <article class="card card-hover lrow reveal" data-open="${p.id}">
          <div class="ph thumb" data-label="preview"></div>
          <div class="lbody">
            <div style="display:flex;gap:.5rem;align-items:center"><span class="tag tag-accent">${p.category}</span><span class="proj-meta">${p.org}</span></div>
            <h3>${p.title}</h3>
            <p class="desc">${p.short}</p>
            <div class="tag-row">${p.tech.slice(0,5).map(tagPill).join("")}</div>
          </div>
          <div class="lside">
            <span class="num-idx">${String(i+1).padStart(2,"0")}</span>
            <span class="link-more">Open ${ICON.arrow}</span>
          </div>
        </article>`).join("") + `</div>`;
    }

    function renderMin(items) {
      return `<div class="proj-min">` + items.map((p, i) => `
        <div class="mcell reveal" data-open="${p.id}">
          <span class="midx">${String(i+1).padStart(2,"0")} · ${p.category}</span>
          <h3>${p.title}</h3>
          <p class="desc">${p.short}</p>
          <div class="mfoot"><div class="tag-row">${p.tech.slice(0,3).map(tagPill).join("")}</div><span class="link-more">${ICON.arrow}</span></div>
        </div>`).join("") + `</div>`;
    }

    function renderProjects() {
      const items = filtered();
      const mount = document.getElementById("projectsMount");
      mount.innerHTML = curStyle === "grid" ? renderGrid(items) : curStyle === "list" ? renderList(items) : renderMin(items);
      mount.querySelectorAll("[data-open]").forEach(el => el.addEventListener("click", () => openDrawer(el.getAttribute("data-open"))));
      initReveals();
    }

    function openDrawer(id) {
      const p = PROJECTS.find(x => x.id === id);
      if (!p) return;
      const linkBtns = [];
      if (p.links.github && p.links.github !== "#") linkBtns.push(`<a class="btn btn-outline" href="${p.links.github}" target="_blank" rel="noopener">${ICON.github} GitHub</a>`);
      else if (p.links.github === "#") linkBtns.push(`<a class="btn btn-outline" href="${PROFILE.links.github}" target="_blank" rel="noopener">${ICON.github} GitHub</a>`);
      if (p.links.paper) linkBtns.push(`<a class="btn btn-outline" href="${p.links.paper}" target="_blank" rel="noopener">${ICON.paper} Paper</a>`);
      if (p.links.demo) linkBtns.push(`<a class="btn btn-outline" href="${p.links.demo}" target="_blank" rel="noopener">${ICON.demo} Demo</a>`);

      document.getElementById("drawerInner").innerHTML = `
        <button class="drawer-close" id="drawerClose" aria-label="Close">${ICON.close}</button>
        <div style="clear:both"></div>
        <span class="tag tag-accent">${p.category}</span>
        <h2 style="font-size:clamp(1.6rem,4vw,2.2rem);margin:1rem 0 .5rem">${p.title}</h2>
        <div class="proj-meta" style="margin-bottom:1.2rem">${p.org}</div>
        <div class="ph" data-label="${p.id} screenshot" style="aspect-ratio:16/9;border-radius:14px;margin-bottom:1.5rem"></div>
        <p class="lead" style="font-size:1.05rem;color:var(--text);margin-bottom:1.8rem">${p.short}</p>
        <div class="detail-grid" style="margin-bottom:1.8rem">
          <div class="detail-block"><div class="dk">Problem</div><p>${p.problem}</p></div>
          <div class="detail-block"><div class="dk">Dataset</div><p>${p.dataset}</p></div>
          <div class="detail-block" style="grid-column:1/-1"><div class="dk">Methodology</div><p>${p.method}</p></div>
        </div>
        <div class="dk" style="font-family:'Space Grotesk';font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:.6rem">Technologies</div>
        <div class="tag-row" style="margin-bottom:1.8rem">${p.tech.map(tagPill).join("")}</div>
        <div class="dk" style="font-family:'Space Grotesk';font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:.8rem">Results</div>
        <div class="grid-3" style="gap:.8rem;margin-bottom:2rem">${p.results.map(r => `<div class="card" style="padding:1rem"><div style="font-family:'Space Grotesk';font-weight:600;font-size:1.05rem">${r.v}</div><div class="faint" style="font-size:.82rem;margin-top:.2rem">${r.k}</div></div>`).join("")}</div>
        <div style="display:flex;gap:.7rem;flex-wrap:wrap">${linkBtns.join("") || '<span class="faint" style="font-size:.9rem">Links coming soon.</span>'}</div>`;

      document.getElementById("drawer").classList.add("open");
      document.getElementById("drawer").setAttribute("aria-hidden", "false");
      document.getElementById("drawerBackdrop").classList.add("open");
      document.body.style.overflow = "hidden";
      document.getElementById("drawerClose").addEventListener("click", closeDrawer);
    }

    function closeDrawer() {
      document.getElementById("drawer").classList.remove("open");
      document.getElementById("drawer").setAttribute("aria-hidden", "true");
      document.getElementById("drawerBackdrop").classList.remove("open");
      document.body.style.overflow = "";
    }

    function onPageReady() {
      // restore saved card style
      try { curStyle = localStorage.getItem("afraz-cardstyle") || "grid"; } catch (e) {}
      document.querySelectorAll("#styleSwitch button").forEach(b => b.classList.toggle("active", b.dataset.style === curStyle));

      document.getElementById("filterRow").innerHTML = PROJECT_CATEGORIES.map((c, i) =>
        `<button class="${i===0?"active":""}" data-cat="${c}">${c}</button>`).join("");
      document.querySelectorAll("#filterRow button").forEach(b => b.addEventListener("click", () => {
        curFilter = b.dataset.cat;
        document.querySelectorAll("#filterRow button").forEach(x => x.classList.toggle("active", x === b));
        renderProjects();
      }));

      document.querySelectorAll("#styleSwitch button").forEach(b => b.addEventListener("click", () => {
        curStyle = b.dataset.style;
        try { localStorage.setItem("afraz-cardstyle", curStyle); } catch (e) {}
        document.querySelectorAll("#styleSwitch button").forEach(x => x.classList.toggle("active", x === b));
        renderProjects();
      }));

      document.getElementById("drawerBackdrop").addEventListener("click", closeDrawer);
      document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

      renderProjects();
    }
  </script>
</body>
</html>
